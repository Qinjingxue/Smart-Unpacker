name: Build and Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag/version to publish, for example v0.1.0. Leave empty to build artifacts only."
        required: false
        type: string
      publish_release:
        description: "Create or update a GitHub Release when release_tag is set."
        required: false
        default: true
        type: boolean
      prerelease:
        description: "Mark a manually published release as a prerelease."
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: windows-2022
            rust_target: x86_64-pc-windows-msvc
            python_arch: x64
          - arch: arm64
            runner: windows-11-arm
            rust_target: aarch64-pc-windows-msvc
            python_arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: ${{ matrix.python_arch }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt

      - name: Set up Rust
        shell: pwsh
        run: |
          rustup default stable
          rustup target add ${{ matrix.rust_target }}
          cargo --version
          rustc -Vv

      - name: Show toolchain architecture
        shell: pwsh
        run: |
          python -c "import platform, sys; print(sys.version); print(platform.machine())"
          Write-Host "PROCESSOR_ARCHITECTURE=$env:PROCESSOR_ARCHITECTURE"

      - name: Prepare native/tool environment
        shell: pwsh
        run: |
          .\scripts\setup_windows_dev.ps1 -IncludeBuildDeps -Arch ${{ matrix.arch }}

      - name: Build Windows package
        shell: pwsh
        run: |
          $version = ""
          if ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ inputs.release_tag }}" -ne "") {
            $version = "${{ inputs.release_tag }}"
          } elseif ("${{ startsWith(github.ref, 'refs/tags/') }}" -eq "true") {
            $version = "${{ github.ref_name }}"
          }

          $buildArgs = @("-SkipTests", "-Arch", "${{ matrix.arch }}")
          if ($version -ne "") {
            $buildArgs += @("-Version", $version)
          }
          .\scripts\build_windows.ps1 @buildArgs

      - name: Verify package architecture
        shell: pwsh
        run: |
          $packageRoot = if ("${{ matrix.arch }}" -eq "x64") { "dist\sunpack" } else { "dist\sunpack-${{ matrix.arch }}" }
          .\scripts\verify_windows_package_arch.ps1 -PackageRoot $packageRoot -Arch ${{ matrix.arch }}

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: sunpack-windows-${{ matrix.arch }}
          path: release/sunpack-windows-${{ matrix.arch }}-*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: ${{ startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish_release && inputs.release_tag != '') }}
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.release_tag }}
          RELEASE_TARGET: ${{ github.sha }}
          PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t packages < <(find artifacts -type f -name 'sunpack-windows-*.zip' | sort)
          if [ "${#packages[@]}" -eq 0 ]; then
            echo "No release packages found." >&2
            exit 1
          fi

          notes="Automated SunPack Windows build for ${TAG_NAME}."
          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" "${packages[@]}" --clobber
          else
            release_args=(release create "${TAG_NAME}" "${packages[@]}" --title "${TAG_NAME}" --notes "${notes}" --target "${RELEASE_TARGET}")
            if [ "${PRERELEASE}" = "true" ]; then
              release_args+=(--prerelease)
            fi
            gh "${release_args[@]}"
          fi
